<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strain Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --border: #2a2a35;
    --accent: #c8ff6e;
    --accent2: #ff9f1c;
    --accent3: #7b61ff;
    --text: #f0f0f5;
    --muted: #888899;
    --ind: #7b61ff;
    --sat: #00d4aa;
    --hyb: #ff9f1c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  .header {
    background: linear-gradient(135deg, #0d0d0f 0%, #1a1a24 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height:1;
  }
  .header p { font-size:0.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
  .header-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  
  .btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:500;
    cursor:pointer; transition: all 0.2s; letter-spacing:0.5px;
  }
  .btn-primary { background:var(--accent); color:#0d0d0f; border-color:var(--accent); }
  .btn-ghost { background:transparent; color:var(--text); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

  .filters {
    padding: 12px 16px;
    display:flex; gap:8px; overflow-x:auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display:none; }
  .filter-chip {
    white-space:nowrap;
    padding: 5px 12px; border-radius:20px;
    border: 1px solid var(--border); background:transparent;
    color:var(--muted); font-size:0.75rem; cursor:pointer;
    transition: all 0.2s;
  }
  .filter-chip.active { border-color:var(--accent); color:var(--accent); background: rgba(200,255,110,0.08); }

  .strain-list { padding: 12px 16px; display:flex; flex-direction:column; gap:10px; }
  
  .strain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .strain-card.expanded { border-color: var(--accent); }
