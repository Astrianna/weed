<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Household 420 Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f; --surface: #16161a; --card: #1e1e24; --border: #2a2a35;
    --brand-green: #4ade80;
    --text: #f0f0f5; --muted: #888899;
    --indica: #a78bfa; --sativa: #fbbf24; --hybrid: #34d399;
    --pro-text: #4ade80; --con-text: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding-bottom: 50px; }

  .header { background: rgba(13,13,15,0.9); border-bottom: 1px solid var(--border); padding: 16px; position: sticky; top:0; z-index:100; backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-family:'Bebas Neue'; font-size: 2.2rem; letter-spacing: 2px; color: var(--brand-green); }
  
  .user-identity { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .user-avatar { width: 10px; height: 10px; border-radius: 50%; }
  .user-name { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.8px; }

  .overlay { position:fixed; inset:0; background:rgba(5,5,5,0.98); z-index:2000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(20px); padding: 20px; overflow-y: auto; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 380px; padding: 24px; }
  
  .btn { padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); font-family:'DM Sans'; font-size:0.75rem; font-weight:600; cursor:pointer; background: transparent; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-accent { background: var(--brand-green); color: #000; border:none; }
  .btn-small { padding: 4px 8px; font-size: 0.6rem; text-transform: uppercase; }
  
  .input { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 12px; border-radius: 8px; width: 100%; font-family: 'DM Sans'; font-size: 0.9rem; margin-top: 5px; }
  .label { font-size: 0.55rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }

  .strain-list { padding: 16px; display:grid; gap:12px; }
  .strain-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .strain-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  
  .fav-btn { width: 22px; height: 22px; cursor: pointer; margin-right: 12px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .fav-btn svg { width: 100%; height: 100%; fill: currentColor; pointer-events: none; }

  .tag-indica { color: var(--indica); border-color: rgba(167, 139, 250, 0.3); background: rgba(167, 139, 250, 0.05); }
  .tag-sativa { color: var(--sativa); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.05); }
  .tag-hybrid { color: var(--hybrid); border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.05); }
  
  .type-tag { font-size: 0.55rem; font-weight: 900; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; border: 1px solid transparent; }
  .stock-pill { font-size: 0.65rem; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; font-weight: 800; border: 1px solid transparent; }
  .stock-high { color: var(--brand-green); border-color: var(--brand-green); }
  .stock-low { color: #fbbf24; border-color: #fbbf24; }
  .stock-out { color: #f87171; border-color: #f87171; }

  .stock-updater { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
  .stock-btn { font-size: 0.6rem; padding: 6px; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; text-transform: uppercase; font-weight: 700; text-align: center; }
  .stock-btn.active { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--muted); }

  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .data-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
  .meta-line { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 0.75rem; }
  .meta-key { color: var(--muted); font-weight: 600; font-size: 0.6rem; text-transform: uppercase; }

  .note-entry { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 0.75rem; border-left: 3px solid #7b61ff; }
</style>
</head>
<body>

<div id="profileOverlay" class="overlay">
  <div class="modal">
    <h2 style="font-family:'Bebas Neue'; font-size: 1.8rem; margin-bottom: 20px; color: var(--brand-green);">HOUSEHOLD SETTINGS</h2>
    <div id="userGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom: 20px;"></div>
    <div id="colorSettings" style="border-top: 1px solid var(--border); padding-top: 20px; display:none;">
        <span class="label">Your Theme Color</span>
        <input type="color" id="colorPicker" class="input" style="height: 50px; padding: 5px; cursor: pointer;">
        <button class="btn btn-accent" style="width:100%; margin-top: 10px;" onclick="saveProfileSettings()">Update Color</button>
        <button class="btn" style="width:100%; margin-top: 10px; border:none;" onclick="closeOverlays()">Done</button>
    </div>
  </div>
</div>

<div class="header">
  <h1>420</h1>
  <div class="user-identity" onclick="openProfileMenu()">
    <span id="displayUserName" class="user-name">...</span>
    <div id="statusDot" class="user-avatar"></div>
  </div>
</div>

<div class="strain-list" id="strainList"></div>

<script>
const SB_URL = 'https://lukkvyjkkwrtbshzcmbo.supabase.co';
const SB_KEY = 'sb_publishable_vw0EbFO3Y2V4k95ONkm3Rw_4PovdtRO';
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let strains = [], profiles = [], currentUser = null;

function toHex(c) {
    if (!c) return "#4ade80";
    if (c.startsWith("#")) return c;
    const ctx = document.createElement('canvas').getContext('2d');
    ctx.fillStyle = c;
    return ctx.fillStyle; 
}

const observer = new MutationObserver(() => {
    const overlay = document.getElementById('profileOverlay');
    const picker = document.getElementById('colorPicker');
    if (overlay.style.display === 'flex' && currentUser) {
        setTimeout(() => { picker.value = toHex(currentUser.color); }, 10);
    }
});
observer.observe(document.getElementById('profileOverlay'), { attributes: true, attributeFilter: ['style'] });

async function init() {
    await loadProfiles();
    const storedUser = localStorage.getItem('strain_user');
    currentUser = profiles.find(p => p.name === storedUser);

    if (!currentUser) {
        document.getElementById('profileOverlay').style.display = 'flex';
    } else {
        document.getElementById('colorSettings').style.display = 'block';
        document.getElementById('displayUserName').innerText = (currentUser.name || '').toUpperCase();
        document.getElementById('displayUserName').style.color = currentUser.color;
        document.getElementById('statusDot').style.backgroundColor = currentUser.color;
        fetchStrains();
    }
}

async function loadProfiles() {
    const { data } = await _supabase.from('profiles').select('*').order('name');
    if (data) {
        profiles = data;
        document.getElementById('userGrid').innerHTML = data.map(p => `
            <button class="btn" style="border-color:${p.color}; color:${p.color}" onclick="setUser('${p.name}')">${p.name}</button>
        `).join('');
    }
}

function openProfileMenu() { document.getElementById('profileOverlay').style.display = 'flex'; }
function setUser(name) { localStorage.setItem('strain_user', name); location.reload(); }
async function saveProfileSettings() {
    await _supabase.from('profiles').update({ color: document.getElementById('colorPicker').value }).eq('id', currentUser.id);
    location.reload();
}
function closeOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

async function fetchStrains() {
    const { data } = await _supabase.from('strains').select('*');
    if (data) {
        strains = data.sort((a,b) => {
            const aFav = (a.favorites || []).includes(currentUser.name) ? 1 : 0;
            const bFav = (b.favorites || []).includes(currentUser.name) ? 1 : 0;
            return bFav - aFav;
        });
        renderList();
    }
}

function renderList() {
    document.getElementById('strainList').innerHTML = strains.map(s => {
        const isFav = (s.favorites || []).includes(currentUser.name);
        const typeClass = (s.type || '').toLowerCase().includes('indica') ? 'tag-indica' : (s.type || '').toLowerCase().includes('sativa') ? 'tag-sativa' : 'tag-hybrid';
        const stockClass = (s.stock || '').toLowerCase().includes('high') ? 'stock-high' : (s.stock || '').toLowerCase().includes('low') ? 'stock-low' : 'stock-out';
        const favNames = (s.favorites || []).map(name => {
            const p = profiles.find(x => x.name === name);
            return `<span style="color:${p?.color || 'var(--text)'}; font-weight:700;">${name}</span>`;
        }).join(', ') || 'No one';

        return `
        <div class="strain-card">
            <div class="strain-header" onclick="toggleCard(${s.id})">
                <div style="display:flex; align-items:center;">
                    <div id="heart-${s.id}" class="fav-btn" style="color: ${isFav ? currentUser.color : 'var(--border)'};" onclick="toggleFav(event, ${s.id})">
                         <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div>
                        <div style="font-weight:700;">${s.name}</div>
                        <div style="display:flex; align-items:center;"><span class="type-tag ${typeClass}">${s.type || 'Hybrid'}</span></div>
                    </div>
                </div>
                <div id="pill-${s.id}" class="stock-pill ${stockClass}">${s.stock || 'Out'}</div>
            </div>
            
            <div id="body-${s.id}" style="display:none; padding:16px; border-top:1px solid var(--border);">
                <span class="label">Update Stock</span>
                <div class="stock-updater">
                    <div class="stock-btn ${s.stock==='High Stock'?'active':''}" onclick="updateStock(${s.id}, 'High Stock')">High</div>
                    <div class="stock-btn ${s.stock==='Low Stock'?'active':''}" onclick="updateStock(${s.id}, 'Low Stock')">Low</div>
                    <div class="stock-btn ${s.stock==='Out of Stock'?'active':''}" onclick="updateStock(${s.id}, 'Out of Stock')">Out</div>
                </div>

                <div class="data-grid">
                    <div class="data-box"><span class="label">Pros</span><div style="font-size:0.7rem; color:var(--pro-text);">${s.pros || 'N/A'}</div></div>
                    <div class="data-box"><span class="label">Cons</span><div style="font-size:0.7rem; color:var(--con-text);">${s.cons || 'N/A'}</div></div>
                </div>
                
                <div class="meta-line"><span class="meta-key">Genetics / Terps</span><span>${s.terpenes || '--'}</span></div>
                <div class="meta-line"><span class="meta-key">Flavor</span><span>${s.flavor || '--'}</span></div>
                <div class="meta-line"><span class="meta-key">Best For</span><span>${s.bestFor || '--'}</span></div>
                <div class="meta-line"><span class="meta-key">Favorite Of</span><span id="fav-list-${s.id}">${favNames}</span></div>

                <div style="margin-top:15px;">
                    <span class="label">Household Notes</span>
                    <div id="notes-container-${s.id}">${renderNotes(s)}</div>
                    <input type="text" id="in-${s.id}" class="input" style="padding:8px; font-size:0.75rem;" placeholder="Add new note...">
                    <button class="btn btn-accent" style="width:100%; margin-top:5px; padding:6px;" onclick="saveNote(${s.id})">Save Note</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderNotes(strain) {
    if (!strain.notes || strain.notes.length === 0) return '<div style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;">No notes yet.</div>';
    return strain.notes.map((n, idx) => {
        const p = profiles.find(x => x.name === n.user);
        return `
            <div class="note-entry" style="border-left-color:${p?.color}">
                <b style="color:${p?.color}">${n.user}:</b> 
                <span id="note-text-${strain.id}-${idx}">${n.text}</span>
                ${n.user === currentUser.name ? `
                    <div class="note-actions">
                        <button class="btn btn-small" onclick="editNoteMode(${strain.id}, ${idx})">Edit</button>
                    </div>` : ''}
            </div>`;
    }).join('');
}

function toggleCard(id) {
    const el = document.getElementById(`body-${id}`);
    const isHidden = el.style.display === 'none';
    document.querySelectorAll('[id^="body-"]').forEach(b => b.style.display = 'none');
    if(isHidden) el.style.display = 'block';
}

async function updateStock(id, status) {
    const s = strains.find(x => x.id === id);
    s.stock = status;
    await _supabase.from('strains').update({ stock: status }).eq('id', id);
    
    // Silent UI update
    const pill = document.getElementById(`pill-${id}`);
    pill.innerText = status;
    pill.className = `stock-pill stock-${status.toLowerCase().split(' ')[0]}`;
    
    // Update button states in expanded view
    const body = document.getElementById(`body-${id}`);
    body.querySelectorAll('.stock-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.toLowerCase() === status.toLowerCase().split(' ')[0]);
    });
}

function editNoteMode(strainId, noteIdx) {
    const span = document.getElementById(`note-text-${strainId}-${noteIdx}`);
    const currentText = span.innerText;
    span.innerHTML = `<input type="text" id="edit-input-${strainId}-${noteIdx}" class="input" style="padding:4px; font-size:0.75rem;" value="${currentText}">
                      <button class="btn btn-small btn-accent" style="margin-top:5px;" onclick="updateNote(${strainId}, ${noteIdx})">Update</button>`;
}

async function updateNote(strainId, noteIdx) {
    const newText = document.getElementById(`edit-input-${strainId}-${noteIdx}`).value.trim();
    const s = strains.find(x => x.id === strainId);
    if (newText === "") s.notes.splice(noteIdx, 1);
    else s.notes[noteIdx].text = newText;
    await _supabase.from('strains').update({ notes: s.notes }).eq('id', strainId);
    document.getElementById(`notes-container-${strainId}`).innerHTML = renderNotes(s);
}

async function saveNote(id) {
    const input = document.getElementById(`in-${id}`);
    if(!input.value) return;
    const s = strains.find(x => x.id === id);
    s.notes = [...(s.notes || []), { user: currentUser.name, text: input.value }];
    await _supabase.from('strains').update({ notes: s.notes }).eq('id', id);
    input.value = "";
    document.getElementById(`notes-container-${id}`).innerHTML = renderNotes(s);
}

async function toggleFav(e, id) {
    e.stopPropagation();
    const s = strains.find(x => x.id === id);
    if (!s) return;
    let f = Array.isArray(s.favorites) ? [...s.favorites] : [];
    if (f.includes(currentUser.name)) f = f.filter(n => n !== currentUser.name);
    else f.push(currentUser.name);
    s.favorites = f;
    const { error } = await _supabase.from('strains').update({ favorites: f }).eq('id', id);
    if (!error) {
        document.getElementById(`heart-${id}`).style.color = f.includes(currentUser.name) ? currentUser.color : 'var(--border)';
        document.getElementById(`fav-list-${id}`).innerHTML = f.map(name => {
            const p = profiles.find(x => x.name === name);
            return `<span style="color:${p?.color || 'var(--text)'}; font-weight:700;">${name}</span>`;
        }).join(', ') || 'No one';
    }
}

init();
</script>
</body>
</html>
