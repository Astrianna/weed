<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strain Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --border: #2a2a35;
    --accent: #c8ff6e;
    --accent2: #ff9f1c;
    --accent3: #7b61ff;
    --text: #f0f0f5;
    --muted: #888899;
    --danger: #ff5252;
    --ind: #7b61ff;
    --sat: #00d4aa;
    --hyb: #ff9f1c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d0d0f 0%, #1a1a24 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height:1;
  }
  .header p { font-size:0.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
  .header-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:500;
    cursor:pointer; transition: all 0.2s; letter-spacing:0.5px;
  }
  .btn-primary { background:var(--accent); color:#0d0d0f; border-color:var(--accent); }
  .btn-ghost { background:transparent; color:var(--text); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }

  /* FILTERS */
  .filters {
    padding: 12px 16px;
    display:flex; gap:8px; overflow-x:auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display:none; }
  .filter-chip {
    white-space:nowrap; padding: 5px 12px; border-radius:20px;
    border: 1px solid var(--border); background:transparent;
    color:var(--muted); font-size:0.75rem; cursor:pointer;
    transition: all 0.2s;
  }
  .filter-chip.active { border-color:var(--accent); color:var(--accent); background: rgba(200,255,110,0.08); }

  /* STRAIN LIST */
  .strain-list { padding: 12px 16px; display:flex; flex-direction:column; gap:10px; }
  .strain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .strain-card.expanded { border-color: var(--accent); }

  .strain-header {
    padding: 14px 16px;
    display: flex; align-items: center; gap:12px;
    cursor: pointer;
  }
  .strain-num { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--muted); min-width:24px; }
  .strain-info { flex:1; min-width:0; }
  .strain-name { font-weight:600; font-size:0.95rem; }
  .strain-meta { display:flex; gap:8px; align-items:center; margin-top:3px; }
  
  /* TYPE BADGES */
  .type-badge { font-size:0.65rem; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:4px; letter-spacing:0.5px; }
  .type-indica { background:rgba(123,97,255,0.15); color:var(--ind); }
  .type-sativa { background:rgba(0,212,170,0.15); color:var(--sat); }
  .type-hybrid { background:rgba(255,159,28,0.15); color:var(--hyb); }
  
  .thc-pill { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--accent); }
  .expand-icon { color:var(--muted); transition: transform 0.2s; }
  .strain-card.expanded .expand-icon { transform: rotate(180deg); }

  .strain-body { display:none; padding:0 16px 16px; border-top:1px solid var(--border); }
  .strain-card.expanded .strain-body { display:block; }

  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .detail-box { background: var(--surface); border-radius:10px; padding:12px; border: 1px solid var(--border); }
  .detail-box.full { grid-column: 1/-1; }
  .detail-label { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
  .detail-label .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .detail-value { font-size:0.83rem; color:var(--text); }
  
  .terp-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .terp-tag { font-family:'DM Mono',monospace; font-size:0.68rem; padding:3px 8px; border-radius:6px; background:rgba(123,97,255,0.1); color:#a89aff; }

  .edit-area { width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; font-family:'DM Mono',monospace; font-size:0.75rem; min-height:100px; }
</style>
</head>
<body>

<div class="header">
  <h1>STRAIN GUIDE</h1>
  <p id="strainCount">Loading...</p>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="toggleAll()">Expand All</button>
    <button class="btn btn-ghost" onclick="toggleEditMode()">✏️ Edit Data</button>
  </div>
</div>

<div class="filters">
  <button class="filter-chip active" id="filterAll" onclick="filterStrains('all', this)">All</button>
  <button class="filter-chip" onclick="filterStrains('sleepy', this)">😴 Sleepy</button>
  <button class="filter-chip" onclick="filterStrains('talkative', this)">🗣️ Talkative</button>
  <button class="filter-chip" onclick="filterStrains('energy', this)">⚡ Energy</button>
  <button class="filter-chip" onclick="filterStrains('pain', this)">🩹 Pain Relief</button>
  <button class="filter-chip" onclick="filterStrains('creative', this)">🎨 Creative</button>
  <button class="filter-chip" onclick="filterStrains('relaxed', this)">🛋️ Relaxed</button>
  <button class="filter-chip" onclick="filterStrains('euphoric', this)">😊 Euphoric</button>
  <button class="filter-chip" onclick="filterStrains('happy', this)">😄 Happy</button>
  <button class="filter-chip" onclick="filterStrains('focused', this)">🎯 Focused</button>
  <button class="filter-chip" onclick="filterStrains('hungry', this)">🍔 Hungry</button>
</div>

<div class="strain-list" id="strainList"></div>

<script>
const SB_URL = 'https://lukkvyjkkwrtbshzcmbo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1a2t2eWpra3dydGJzaHpjbWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjc0NTIsImV4cCI6MjA5MTg0MzQ1Mn0.IMFluSCt8XXCbh6WylfJVyHtEyFDbk9jeftofn_OhXM';

const _supabase = supabase.createClient(SB_URL, SB_KEY);

let strains = [];
let editMode = false;
let allExpanded = false;

async function fetchStrains() {
  try {
    const { data, error } = await _supabase
      .from('strains')
      .select('*')
      .order('name', { ascending: true });

    if (error) throw error;

    strains = data || [];
    
    document.getElementById('strainCount').innerText = 
      `${strains.length} Strains Available`;

    renderStrains('all');
  } catch (err) {
    console.error("Supabase fetch error:", err);
    document.getElementById('strainCount').innerHTML = 
      `Failed to load strains.<br><small style="color:#ff5252">Error: ${err.message || 'Check console (F12) for details'}</small>`;
  }
}

function renderStrains(filter) {
  const list = document.getElementById('strainList');
  list.innerHTML = '';
  
  let filtered = strains;
  
  if (filter !== 'all') {
    const lowerFilter = filter.toLowerCase();
    filtered = strains.filter(s => {
      const tags = (s.tags || '').toLowerCase();
      const bestFor = (s.bestFor || '').toLowerCase();
      return tags.includes(lowerFilter) || bestFor.includes(lowerFilter);
    });
  }

  if (filtered.length === 0) {
    list.innerHTML = `<p style="padding:40px 20px; color:var(--muted); text-align:center; font-size:0.9rem;">
      No strains match this filter.
    </p>`;
    return;
  }

  filtered.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = `strain-card ${allExpanded ? 'expanded' : ''}`;
    card.id = `card-${i}`;
    
    const typeClass = `type-${(s.type || 'hybrid').toLowerCase().replace(/[^a-z]/g, '')}`;

    let terpHTML = 'None';
    if (s.terpenes) {
      const terps = Array.isArray(s.terpenes) 
        ? s.terpenes 
        : String(s.terpenes).split(',').map(t => t.trim());
      terpHTML = terps.map(t => `<span class="terp-tag">${t}</span>`).join('');
    }

    card.innerHTML = `
      <div class="strain-header" onclick="toggleCard(${i})">
        <span class="strain-num">${String(i+1).padStart(2,'0')}</span>
        <div class="strain-info">
          <div class="strain-name">${s.name}</div>
          <div class="strain-meta">
            <span class="type-badge \( {typeClass}"> \){s.type || 'Hybrid'}</span>
            <span class="thc-pill">THC ${s.thc || '??%'}</span>
          </div>
        </div>
        <span class="expand-icon">▾</span>
      </div>
      <div class="strain-body">
        <div class="detail-grid">
          <div class="detail-box full">
            <div class="detail-label"><span class="dot" style="background:var(--muted)"></span>Genetics</div>
            <div class="detail-value">${s.genetics || 'Unknown'}</div>
          </div>
          <div class="detail-box full">
            <div class="detail-label"><span class="dot" style="background:var(--accent3)"></span>Terpenes</div>
            <div class="terp-tags">${terpHTML}</div>
          </div>
          <div class="detail-box full">
            <div class="detail-label"><span class="dot" style="background:var(--accent2)"></span>Best For</div>
            <div class="detail-value">${s.bestFor || 'General Use'}</div>
          </div>
          ${editMode ? `
            <div class="detail-box full">
              <textarea class="edit-area" id="edit-\( {s.id || i}"> \){JSON.stringify(s, null, 2)}</textarea>
              <button class="btn btn-primary" style="margin-top:10px" onclick="saveToCloud(${s.id || i})">Save Changes</button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCard(i) { 
  document.getElementById(`card-${i}`).classList.toggle('expanded'); 
}

function filterStrains(type, btn) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderStrains(type);
}

function toggleEditMode() { 
  editMode = !editMode; 
  renderStrains('all'); 
}

function toggleAll() { 
  allExpanded = !allExpanded; 
  document.querySelectorAll('.strain-card').forEach(c => c.classList.toggle('expanded', allExpanded)); 
}

// Load the data
fetchStrains();
</script>
</body>
</html>
