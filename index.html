<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>420 Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0d;
  --surface: #111116;
  --card: #18181f;
  --card2: #1e1e28;
  --border: #2a2a38;
  --border2: #333345;
  --brand: #4ade80;
  --brand-dim: rgba(74,222,128,0.12);
  --text: #eeeef5;
  --muted: #7878a0;
  --muted2: #555570;
  --indica: #b48efa;
  --sativa: #fcd34d;
  --hybrid: #34d399;
  --ih: #7dd3c0;
  --sh: #f59e6b;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
  --stock-high: #4ade80;
  --stock-mid: #a3e635;
  --stock-low: #fbbf24;
  --stock-out: #f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ──────── SCROLLBAR ──────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* Hide scrollbar on loved-by boxes while still allowing scroll if needed */
.data-grid-3 .data-box-val::-webkit-scrollbar { display: none; }
.data-grid-3 .data-box-val { scrollbar-width: none; -ms-overflow-style: none; }

/* ──────── HEADER ──────── */
.header{background:rgba(10,10,13,0.92);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);}
.header-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.header-row2{display:flex;gap:6px;align-items:center;}
.logo{font-family:'Bebas Neue';font-size:2rem;letter-spacing:3px;color:var(--brand);line-height:1;}
.user-chip{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02);transition:.2s;}
.user-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.user-name{font-size:0.72rem;font-weight:800;letter-spacing:.8px;}

/* ──────── BUTTONS ──────── */
.btn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);font-family:'DM Sans';font-size:0.72rem;font-weight:700;cursor:pointer;background:transparent;color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.18s;letter-spacing:.4px;white-space:nowrap;-webkit-tap-highlight-color:rgba(255,255,255,0.05);}
.btn:active{transform:scale(0.96);}
.btn-accent{background:var(--brand);color:#000;border:none;font-weight:800;}
.btn-accent:hover{background:#5ef090;}
.btn-ghost{background:rgba(255,255,255,0.04);border-color:var(--border2);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-danger{background:rgba(248,113,113,0.12);border-color:rgba(248,113,113,0.4);color:var(--red);}
.btn-sm{padding:5px 9px;font-size:0.65rem;border-radius:6px;}
.btn-icon{width:30px;height:30px;padding:0;border-radius:7px;font-size:14px;}

/* ADD + EXPAND buttons */
.add-btn{background:var(--brand);color:#000;border:none;font-weight:800;padding:7px 14px;border-radius:8px;font-size:0.72rem;font-family:'DM Sans';cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s;letter-spacing:.4px;}
.add-btn:active{transform:scale(0.96);}
.expand-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--muted);padding:7px 12px;border-radius:8px;font-size:0.65rem;font-family:'DM Sans';font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;letter-spacing:.4px;transition:.18s;}
.expand-btn:active{transform:scale(0.96);}

/* AI Lookup button */
.ai-btn{background:linear-gradient(135deg,rgba(139,92,246,0.25),rgba(59,130,246,0.2));border:1px solid rgba(139,92,246,0.4);color:#c4b5fd;padding:7px 13px;border-radius:8px;font-size:0.72rem;font-family:'DM Sans';font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s;letter-spacing:.4px;}
.ai-btn:active{transform:scale(0.96);}

/* ──────── OVERLAYS ──────── */
.overlay{position:fixed;inset:0;background:rgba(5,5,8,0.96);z-index:1000;display:none;align-items:flex-start;justify-content:center;backdrop-filter:blur(20px);padding:16px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:400px;padding:22px;margin:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.modal-title{font-family:'Bebas Neue';font-size:1.7rem;letter-spacing:2px;color:var(--brand);margin-bottom:18px;}

/* ──────── FORM ──────── */
.field-label{font-size:0.55rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:4px;}
.input,.select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:11px 12px;border-radius:8px;width:100%;font-family:'DM Sans';font-size:0.85rem;margin-bottom:10px;outline:none;transition:.15s;}
.input:focus,.select:focus{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-dim);}
.select option{background:var(--surface);}
textarea.input{resize:vertical;min-height:64px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ──────── FILTERS ──────── */
.filter-bar{padding:10px 14px 6px;overflow-x:auto;display:flex;gap:6px;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:0.65rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.18s;letter-spacing:.3px;}
.filter-chip:active{transform:scale(0.95);}
.filter-chip.on{background:rgba(74,222,128,0.15);border-color:var(--brand);color:var(--brand);}

/* ──────── STRAIN CARD ──────── */
.strain-list{padding:10px 12px;display:grid;gap:10px;}
.strain-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.strain-card.disliked{opacity:0.55;}
.strain-header{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px;}
.header-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.header-info{flex:1;min-width:0;}
.strain-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.strain-name{font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.type-badge{font-size:0.5rem;font-weight:900;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid transparent;flex-shrink:0;}
.type-indica{color:var(--indica);border-color:rgba(180,142,250,.3);background:rgba(180,142,250,.07);}
.type-indica-hybrid{color:var(--ih);border-color:rgba(125,211,192,.3);background:rgba(125,211,192,.07);}
.type-hybrid{color:var(--hybrid);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.07);}
.type-sativa-hybrid{color:var(--sh);border-color:rgba(245,158,107,.3);background:rgba(245,158,107,.07);}
.type-sativa{color:var(--sativa);border-color:rgba(252,211,77,.3);background:rgba(252,211,77,.07);}
.medium-badge{font-size:0.5rem;font-weight:700;text-transform:uppercase;padding:2px 5px;border:1px solid transparent;border-radius:4px;}
.medium-flower{color:#4ade80;background:rgba(74,222,128,.12);}
.medium-vape{color:#67e8f9;background:rgba(103,232,249,.12);}
.medium-wax{color:#f472b6;background:rgba(244,114,182,.12);}
.medium-rso{color:#a78bfa;background:rgba(167,139,250,.12);}
.medium-edible{color:#fb923c;background:rgba(251,146,60,.12);}
.medium-topical{color:#34d399;background:rgba(52,211,153,.12);}
.thc-badge{font-family:'DM Mono';font-size:0.62rem;color:var(--brand);font-weight:500;}
.cannab-badge{font-size:0.5rem;font-weight:800;text-transform:uppercase;padding:2px 5px;border:1px solid transparent;border-radius:4px;}
.cannab-delta9{color:#4ade80;background:rgba(74,222,128,.15);}
.cannab-delta8{color:#c084fc;background:rgba(192,132,252,.15);}
.cannab-thca{color:#fb923c;background:rgba(251,146,60,.15);}
.cannab-cbd{color:#60a5fa;background:rgba(96,165,250,.15);}
.cannab-other{color:#9ca3af;background:rgba(156,163,175,.15);}

.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.react-btn{width:24px;height:24px;cursor:pointer;flex-shrink:0;transition:transform .18s;}
.react-btn:active{transform:scale(1.3);}
.react-btn svg{width:100%;height:100%;}

.stock-pill{font-size:0.58rem;padding:3px 8px;border-radius:8px;text-transform:uppercase;font-weight:900;border:1px solid transparent;letter-spacing:.4px;}
.sp-high{color:var(--stock-high);border-color:var(--stock-high);}
.sp-mid{color:var(--stock-mid);border-color:var(--stock-mid);}
.sp-low{color:var(--stock-low);border-color:var(--stock-low);}
.sp-out{color:var(--stock-out);border-color:var(--stock-out);opacity:.65;}

/* ──────── THC BAR ──────── */
.thc-bar-wrap{margin:0 14px 10px;background:rgba(255,255,255,0.04);border-radius:4px;height:5px;overflow:hidden;}
.thc-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#4ade80,#a3e635);transition:width .4s ease;}

/* ──────── CARD BODY ──────── */
.card-body{padding:12px 14px;border-top:1px solid var(--border);display:none;}
.card-body.open{display:block;}
.section-label{font-size:0.52rem;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:7px;margin-top:12px;}
.section-label:first-child{margin-top:0;}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.data-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.data-box{background:rgba(255,255,255,0.025);padding:9px;border-radius:8px;}
.data-box-val{font-size:0.7rem;line-height:1.4;margin-top:2px;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;}
.pro-text{color:#4ade80;}.con-text{color:#f87171;}
.meta-row{padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:3px;}
.meta-key{color:var(--muted);font-weight:700;font-size:0.52rem;text-transform:uppercase;letter-spacing:.5px;}
.meta-val{font-size:0.72rem;}
.source-cost-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}

/* ──────── STOCK UPDATER + EDIT in body ──────── */
.stock-updater{display:flex;gap:6px;margin-bottom:10px;align-items:center;}
.stock-updater .stock-btn{flex:1;font-size:0.58rem;padding:7px 4px;border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;text-transform:uppercase;font-weight:800;text-align:center;transition:.15s;letter-spacing:.3px;}
.stock-btn:active{transform:scale(0.95);}
.sb-high.active,.sb-high:hover{background:rgba(74,222,128,.12);border-color:var(--stock-high);color:var(--stock-high);}
.sb-mid.active,.sb-mid:hover{background:rgba(163,230,53,.12);border-color:var(--stock-mid);color:var(--stock-mid);}
.sb-low.active,.sb-low:hover{background:rgba(251,191,36,.12);border-color:var(--stock-low);color:var(--stock-low);}
.sb-out.active,.sb-out:hover{background:rgba(248,113,113,.12);border-color:var(--stock-out);color:var(--stock-out);}
.stock-updater .edit-in-body{font-size:0.65rem;padding:7px 12px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);white-space:nowrap;}

/* ──────── NOTES ──────── */
.note-entry{background:rgba(255,255,255,0.025);border-radius:8px;padding:9px 10px;margin-bottom:7px;font-size:0.72rem;border-left:3px solid var(--brand);position:relative;display:flex;align-items:flex-start;gap:8px;}
.note-user{font-weight:700;font-size:0.68rem;white-space:nowrap;flex-shrink:0;}
.note-text{color:var(--text);line-height:1.4;word-break:break-word;overflow-wrap:break-word;flex:1;}
.note-actions{display:flex;gap:5px;margin-left:auto;}

/* ──────── AI CONFIRM MODAL ──────── */
.ai-preview-box{background:rgba(139,92,246,.08);border:1px dashed rgba(139,92,246,.4);border-radius:10px;padding:12px;margin-bottom:12px;}

/* ──────── COLOR WHEEL ──────── */
.color-wheel-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 0;}
#colorCanvas{border-radius:50%;cursor:crosshair;touch-action:none;}
.color-preview-row{display:flex;align-items:center;gap:12px;}
.color-preview-swatch{width:40px;height:40px;border-radius:8px;border:2px solid var(--border);}
.color-hex-input{font-family:'DM Mono';font-size:0.9rem;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;width:110px;text-transform:uppercase;}
.brightness-slider{width:100%;-webkit-appearance:none;height:8px;border-radius:4px;outline:none;cursor:pointer;}
.brightness-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #666;cursor:pointer;}

/* ──────── EDIT CARD MODAL ──────── */
.edit-scroll{max-height:70vh;overflow-y:auto;padding-right:2px;}

/* ──────── CONFIRM DIALOG ──────── */
.confirm-dialog{position:fixed;inset:0;background:rgba(5,5,8,.97);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-dialog.open{display:flex;}
.confirm-box{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:320px;text-align:center;}
.confirm-box p{font-size:0.85rem;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns .btn{flex:1;}

/* ──────── EMPTY ──────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.85rem;}

/* ──────── TOAST ──────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:0.78rem;z-index:9000;transition:transform .3s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ──────── LOADING ──────── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ══════════ OVERLAYS ══════════ -->

<!-- ADD STRAIN -->
<div id="addOverlay" class="overlay">
  <div class="modal">
    <div class="modal-title">ADD TO STASH</div>
    <label class="field-label">Strain Name</label>
    <input type="text" id="add-name" class="input" placeholder="e.g. Wedding Cake">
    <button class="ai-btn" style="width:100%;margin-bottom:12px;" onclick="openAILookup()">✦ AI Lookup</button>
    <div class="modal-actions" style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeOverlays()">Cancel</button>
      <button class="btn btn-accent" style="flex:1;" onclick="openManualAdd()">Manual Add</button>
    </div>
  </div>
</div>

<!-- AI CONFIRM MODAL -->
<div id="aiConfirmOverlay" class="overlay">
  <div class="modal" style="max-width:440px;">
    <div class="modal-title">CONFIRM STRAIN</div>
    <div class="ai-preview-box">
      <span class="field-label" style="color:#c4b5fd;">✦ AI Generated — Review &amp; Edit Before Saving</span>
    </div>
    <div class="edit-scroll">
      <label class="field-label">Strain Name</label>
      <input type="text" id="confirm-name" class="input">
      <div class="row2">
        <div><label class="field-label">Type</label><select id="confirm-type" class="select"><option>Indica</option><option>Indica-Hybrid</option><option>Hybrid</option><option>Sativa-Hybrid</option><option>Sativa</option></select></div>
        <div><label class="field-label">Medium</label><select id="confirm-medium" class="select"><option value="Flower">Flower</option><option value="Vape">Vape</option><option value="Wax">Wax</option><option value="RSO">RSO</option><option value="Edible">Edible</option><option value="Topical">Topical</option></select></div>
      </div>
      <div class="row2">
        <div><label class="field-label">Cannabinoid Type</label><select id="confirm-cannab" class="select"><option value="Δ9">Δ9 (Delta-9)</option><option value="Δ8">Δ8 (Delta-8)</option><option value="THCA">THC-A</option><option value="CBD">CBD</option><option value="Other">Other</option></select></div>
        <div><label class="field-label">THC %</label><input type="number" id="confirm-thcnum" class="input" min="0" max="100" step="0.1" placeholder="e.g. 22.5"></div>
      </div>
      <div class="row2">
        <div><label class="field-label">Source</label><input type="text" id="confirm-source" class="input" placeholder="Dispensary / Grower"></div>
        <div><label class="field-label">Cost</label><input type="text" id="confirm-cost" class="input" placeholder="e.g. $45/8th"></div>
      </div>
      <label class="field-label">Genetics</label><input type="text" id="confirm-genetics" class="input">
      <label class="field-label">Terpenes</label><input type="text" id="confirm-terpenes" class="input">
      <label class="field-label">Flavor</label><input type="text" id="confirm-flavor" class="input">
      <label class="field-label">Pros</label><input type="text" id="confirm-pros" class="input">
      <label class="field-label">Cons</label><input type="text" id="confirm-cons" class="input">
      <label class="field-label">Best For</label><input type="text" id="confirm-bestfor" class="input">
      <label class="field-label">Tags (comma separated)</label><input type="text" id="confirm-tags" class="input" placeholder="Euphoric, Relaxing, Sleepy">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('aiConfirmOverlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-accent" style="flex:1;" onclick="saveConfirmedStrain()">Add to Stash</button>
    </div>
  </div>
</div>

<!-- MANUAL ADD -->
<div id="manualAddOverlay" class="overlay">
  <div class="modal" style="max-width:440px;">
    <div class="modal-title">MANUAL ENTRY</div>
    <div class="edit-scroll">
      <label class="field-label">Strain Name</label>
      <input type="text" id="manual-name" class="input" placeholder="e.g. Wedding Cake">
      <div class="row2">
        <div><label class="field-label">Type</label><select id="manual-type" class="select"><option>Indica</option><option>Indica-Hybrid</option><option selected>Hybrid</option><option>Sativa-Hybrid</option><option>Sativa</option></select></div>
        <div><label class="field-label">Medium</label><select id="manual-medium" class="select"><option value="Flower" selected>Flower</option><option value="Vape">Vape</option><option value="Wax">Wax</option><option value="RSO">RSO</option><option value="Edible">Edible</option><option value="Topical">Topical</option></select></div>
      </div>
      <div class="row2">
        <div><label class="field-label">Cannabinoid</label><select id="manual-cannab" class="select"><option value="Δ9">Δ9 (Delta-9)</option><option value="Δ8">Δ8 (Delta-8)</option><option value="THCA">THC-A</option><option value="CBD">CBD</option><option value="Other">Other</option></select></div>
        <div><label class="field-label">THC %</label><input type="number" id="manual-thcnum" class="input" min="0" max="100" step="0.1"></div>
      </div>
      <div class="row2">
        <div><label class="field-label">Source</label><input type="text" id="manual-source" class="input"></div>
        <div><label class="field-label">Cost</label><input type="text" id="manual-cost" class="input"></div>
      </div>
      <label class="field-label">Genetics</label><input type="text" id="manual-genetics" class="input">
      <label class="field-label">Terpenes</label><input type="text" id="manual-terpenes" class="input">
      <label class="field-label">Flavor</label><input type="text" id="manual-flavor" class="input">
      <label class="field-label">Pros</label><input type="text" id="manual-pros" class="input">
      <label class="field-label">Cons</label><input type="text" id="manual-cons" class="input">
      <label class="field-label">Best For</label><input type="text" id="manual-bestfor" class="input">
      <label class="field-label">Tags</label><input type="text" id="manual-tags" class="input" placeholder="Euphoric, Relaxing, Sleepy">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('manualAddOverlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-accent" style="flex:1;" onclick="saveManualStrain()">Add to Stash</button>
    </div>
  </div>
</div>

<!-- EDIT STRAIN -->

<script>
const SB_URL = 'https://lukkvyjkkwrtbshzcmbo.supabase.co';

const _sb = supabase.createClient(SB_URL, SB_KEY);

let strains = [], profiles = [], currentUser = null;
let openCards = new Set();
let allExpanded = false;
let activeFilters = new Set();
let pendingConfirm = null;
let pickedColor = '';
let brightness = 1;
let currentEditingNote = null;

// ═══════════ INIT ═══════════
async function init() {

async function loadProfiles() {

  if (data) profiles = data;
}

function updateUIForUser() {

}

async function openProfileMenu() {

    <div onclick="switchProfile('${p.name}')" style="background:var(--card2);border:2px solid ${currentUser&&currentUser.name===p.name?'var(--brand)':'var(--border)'};border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;border-radius:50%;background:${p.color||'#4ade80'};flex-shrink:0;"></div>
      <div style="font-weight:700;">${p.name}</div>
    </div>
  `).join('');
  
  pickedColor = currentUser.color || '#4ade80';
  document.getElementById('colorSettings').style.display = 'block';
  initColorWheel();

async function switchProfile(name) {

// ═══════════ CLOSE OVERLAYS ═══════════
function closeOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
}

// ═══════════ COLOR WHEEL ═══════════
function initColorWheel() {
  const canvas = document.getElementById('colorCanvas');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  drawWheel(ctx, cx, cy, r);
  drawWheelSelector(ctx, cx, cy, r, pickedColor);
  updateColorUI(pickedColor);

  function getEventPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function handlePick(e) {
    e.preventDefault();
    const { x, y } = getEventPos(e);
    const dx = x - cx, dy = y - cy;
    if (Math.sqrt(dx*dx + dy*dy) > r + 5) return;
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), r);
    const hue = (angle + 360) % 360;
    const sat = dist / r * 100;
    const lBright = document.getElementById('brightnessSlider').value;
    const hex = hslToHex(hue, sat, lBright * 50);
    pickedColor = hex;
    updateColorUI(hex);
    drawWheel(ctx, cx, cy, r);
    drawWheelSelector(ctx, cx, cy, r, hex, angle, dist);
  }

  canvas.addEventListener('mousedown', handlePick);
  canvas.addEventListener('mousemove', e => { if (e.buttons) handlePick(e); });
  canvas.addEventListener('touchstart', handlePick, {passive:false});
  canvas.addEventListener('touchmove', handlePick, {passive:false});

  document.getElementById('brightnessSlider').addEventListener('input', function() {
    brightness = parseFloat(this.value);
    const col = hexToHsl(pickedColor);
    if (col) {
      const hex = hslToHex(col.h, col.s, brightness * 50);
      pickedColor = hex;
      updateColorUI(hex);
      drawWheel(ctx, cx, cy, r);
    }
  });

  document.getElementById('colorHexInput').addEventListener('change', function() {
    const val = this.value.startsWith('#') ? this.value : '#' + this.value;
    if (/^#[0-9a-fA-F]{6}$/.test(val)) {
      pickedColor = val;
      updateColorUI(val);
      drawWheel(ctx, cx, cy, r);
    }
  });
}

function drawWheel(ctx, cx, cy, r) {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  const b = parseFloat(document.getElementById('brightnessSlider')?.value || 1);
  for (let angle = 0; angle < 360; angle += 1) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, `hsl(${angle},0%,${b*50}%)`);
    grad.addColorStop(1, `hsl(${angle},100%,${b*50}%)`);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, (angle-1)*Math.PI/180, (angle+1)*Math.PI/180);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawWheelSelector(ctx, cx, cy, r, hex, angle, dist) {
  if (!angle && hex) {
    const col = hexToHsl(hex);
    if (!col) return;
    angle = col.h;
    dist = (col.s/100) * r;
  }
  if (!angle) return;
  const rad = angle * Math.PI / 180;
  const sx = cx + Math.cos(rad) * (dist||0);
  const sy = cy + Math.sin(rad) * (dist||0);
  ctx.beginPath();
  ctx.arc(sx, sy, 8, 0, Math.PI*2);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI*2);
  ctx.fillStyle = hex;
  ctx.fill();
}

function updateColorUI(hex) {
  document.getElementById('colorSwatch').style.background = hex;
  document.getElementById('colorHexInput').value = hex;
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h/30) % 12; const col = l - a * Math.max(-1, Math.min(k-3,9-k,1)); return Math.round(255*col).toString(16).padStart(2,'0'); };
  return '#' + f(0) + f(8) + f(4);
}

function hexToHsl(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h,s; const l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r: h=((g-b)/d+(g<b?6:0))/6; break; case g: h=((b-r)/d+2)/6; break; case b: h=((r-g)/d+4)/6; break; }
  }
  return {h:h*360,s:s*100,l:l*100};
}

async function saveProfileColor() {
  await _sb.from('profiles').update({ color: pickedColor }).eq('id', currentUser.id);
  currentUser.color = pickedColor;
  updateUIForUser();
  closeOverlays();
  showToast('Color updated!');
}

// ═══════════ FETCH & SORT ═══════════
async function fetchStrains() {
  const { data } = await _sb.from('strains').select('*');
  if (data) { strains = data; sortAndRender(); }
}

function getReactionStats(s) {
  const hasFav = (s.favorites || []).includes(currentUser.name);
  const hasLike = (s.likes || []).includes(currentUser.name);
  const hasHate = (s.dislikes || []).includes(currentUser.name);
  return { hasFav, hasLike, hasHate };
}

function stockRank(s) {
  const v = (s.stock||'').toLowerCase();
  if (v.includes('high')) return 0;
  if (v.includes('mid')) return 1;
  if (v.includes('low')) return 2;
  return 3;
}

function sortStrains() {
  return [...strains].sort((a, b) => {
    const aRxn = getReactionStats(a);
    const bRxn = getReactionStats(b);
    if (aRxn.hasHate !== bRxn.hasHate) return aRxn.hasHate ? 1 : -1;
    const aBoth = aRxn.hasFav && aRxn.hasLike;
    const bBoth = bRxn.hasFav && bRxn.hasLike;
    if (aBoth !== bBoth) return aBoth ? -1 : 1;
    if (aBoth && bBoth) return stockRank(a) - stockRank(b);
    const aFavOnly = aRxn.hasFav && !aRxn.hasLike;
    const bFavOnly = bRxn.hasFav && !bRxn.hasLike;
    if (aFavOnly !== bFavOnly) return aFavOnly ? -1 : 1;
    if (aFavOnly && bFavOnly) return stockRank(a) - stockRank(b);
    const aLikeOnly = !aRxn.hasFav && aRxn.hasLike;
    const bLikeOnly = !bRxn.hasFav && bRxn.hasLike;
    if (aLikeOnly !== bLikeOnly) return aLikeOnly ? -1 : 1;
    if (aLikeOnly && bLikeOnly) return stockRank(a) - stockRank(b);
    return stockRank(a) - stockRank(b);
  });
}

function getFilteredStrains() {
  if (activeFilters.size === 0) return sortStrains();
  return sortStrains().filter(s => {
    const tags = (s.tags || '').toLowerCase();
    const type = (s.type || '').toLowerCase();
    for (const f of activeFilters) {
      const fl = f.toLowerCase();
      let match = false;
      if (fl === 'indica' || fl === 'sativa' || fl === 'hybrid') {
        if (type.includes(fl)) match = true;
      } else {
        if (tags.includes(fl)) match = true;
      }
      if (!match) return false;
    }
    return true;
  });
}

function sortAndRender() {
  renderList(getFilteredStrains());
}

// ═══════════ FILTERS / EXPAND / THC ═══════════
function toggleFilter(el) {
  const f = el.dataset.filter;
  if (activeFilters.has(f)) { activeFilters.delete(f); el.classList.remove('on'); }
  else { activeFilters.add(f); el.classList.add('on'); }
  sortAndRender();
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const sorted = getFilteredStrains();
  sorted.forEach(s => allExpanded ? openCards.add(s.id) : openCards.delete(s.id));
  document.getElementById('expandAllBtn').textContent = allExpanded ? '⊟ Collapse All' : '⊞ Expand All';
  sortAndRender();
}

function thcBarPct(strain) {
  const thc = parseFloat(strain.thcNum || strain.thc || 0);
  if (!thc) return 0;
  const medium = (strain.medium || 'Flower').toLowerCase();
  let max = medium === 'flower' ? 35 : medium === 'vape' || medium === 'wax' ? 90 : medium === 'rso' ? 80 : medium === 'edible' ? 100 : medium === 'topical' ? 20 : 35;
  return Math.min(100, (thc / max) * 100);
}

// ═══════════ NOTES BUILDER (single-line) ═══════════
function buildNotesHtml(s) {
  return (s.notes || []).map((n, ni) => {
    const p = profiles.find(x => x.name === n.user);
    const isOwn = n.user === currentUser.name;
    let actions = isOwn ? `<div class="note-actions"><button class="btn btn-sm" style="padding:2px 6px;font-size:0.58rem;" onclick="editNote(${s.id},${ni});event.stopPropagation();">✎</button><button class="btn btn-sm" style="padding:2px 6px;font-size:0.58rem;" onclick="deleteNote(${s.id},${ni});event.stopPropagation();">✕</button></div>` : '';
    return `<div class="note-entry" id="note-entry-${s.id}-${ni}" style="border-left-color:${p?.color||'var(--brand)'}">
      <span class="note-user" style="color:${p?.color||'var(--text)'}">${n.user}</span>
      <span class="note-text">${n.text}</span>
      ${actions}
    </div>`;
  }).join('');
}

// ═══════════ RENDER LIST ═══════════
function renderList(list) {
  const sorted = list || getFilteredStrains();
  if (sorted.length === 0) {
    document.getElementById('strainList').innerHTML = '<div class="empty-state">No strains match your filters.</div>';
    return;
  }
  document.getElementById('strainList').innerHTML = sorted.map(s => renderCard(s)).join('');
}

function renderCard(s) {
  const rxn = getReactionStats(s);

        </div>
        <div class="data-grid">
          <div class="data-box"><span class="section-label">Genetics</span><div class="data-box-val">${s.genetics||'--'}</div></div>
          <div class="data-box"><span class="section-label">Flavor</span><div class="data-box-val">${s.flavor||'--'}</div></div>
        </div>
        <div class="data-grid">
          <div class="data-box"><span class="section-label">Source</span><div class="data-box-val">${s.source||'--'}</div></div>
          <div class="data-box"><span class="section-label">Cost</span><div class="data-box-val">${s.cost||'--'}</div></div>
        </div>
        <div class="data-grid-3">
          <div class="data-box"><span class="section-label">Favorite of</span><div class="data-box-val" style="min-height:2.8em;overflow-y:auto;">${(s.favorites||[]).map(name => { const p=profiles.find(x=>x.name===name); return `<span style="color:${p?.color||'var(--text)'};font-weight:700;">${name}</span>`; }).join(', ') || ''}</div></div>
          <div class="data-box"><span class="section-label">Likes</span><div class="data-box-val" style="min-height:2.8em;overflow-y:auto;">${(s.likes||[]).map(name => { const p=profiles.find(x=>x.name===name); return `<span style="color:${p?.color||'var(--text)'};font-weight:700;">${name}</span>`; }).join(', ') || ''}</div></div>
          <div class="data-box"><span class="section-label">Dislikes</span><div class="data-box-val" style="min-height:2.8em;overflow-y:auto;">${(s.dislikes||[]).map(name => { const p=profiles.find(x=>x.name===name); return `<span style="color:${p?.color||'var(--text)'};font-weight:700;">${name}</span>`; }).join(', ') || ''}</div></div>
        </div>
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;">
          <span class="section-label">Notes</span>
          <div id="notes-${s.id}">${notesHtml}</div>
          <div class="add-note-row">
            <input type="text" class="input" id="notein-${s.id}" placeholder="Add a note..." onkeydown="if(event.key==='Enter'){saveNote(${s.id});event.preventDefault();}">
            <button class="btn btn-accent btn-sm" onclick="saveNote(${s.id})">Save</button>
          </div>
        </div>
      </div>`;
  }

  return `
  <div class="strain-card${isDisliked?' disliked':''}" id="card-${s.id}">
    <div class="strain-header" onclick="toggleCard(${s.id})">
      <div class="header-left">
        <div class="header-info">
          <div class="strain-name-row">
            <span class="strain-name">${s.name}</span>
            ${thcDisplay ? `<span class="thc-badge">${thcDisplay}</span>` : ''}
            <span class="cannab-badge ${cannabClass}">${cannab}</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:3px;">
            <span class="type-badge ${typeClass}">${s.type||'Hybrid'}</span>
            <span class="medium-badge ${mediumClass}">${s.medium||'Flower'}</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="react-btn" onclick="cycleReaction(event,${s.id},'fav')">${favIcon}</div>
        <div class="react-btn" onclick="cycleReaction(event,${s.id},'like')">${likeIcon}</div>
        <div class="react-btn" onclick="cycleReaction(event,${s.id},'hate')">${hateIcon}</div>
        <span class="stock-pill ${stockClass}">${stockLabel}</span>
      </div>
    </div>
    ${barPct > 0 && !isOpen ? `<div class="thc-bar-wrap" style="margin-bottom:0;"><div class="thc-bar-fill" style="width:${barPct}%"></div></div>` : ''}
    ${bodyHtml}
  </div>`;
}

// ═══════════ TOGGLE / STOCK / REACTIONS / NOTES ═══════════
function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
  const s = strains.find(x => x.id === id);
  const cardEl = document.getElementById(`card-${id}`);
  if (s && cardEl) cardEl.outerHTML = renderCard(s);
}

async function updateStock(id, status) {
  const s = strains.find(x => x.id === id);
  if (!s) return;
  s.stock = status;
  await _sb.from('strains').update({ stock: status }).eq('id', id);
  const wasOpen = openCards.has(id);
  sortAndRender();
  if (wasOpen) setTimeout(() => document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}), 120);
}

async function cycleReaction(e, id, clicked) {
  e.stopPropagation();
  const s = strains.find(x => x.id === id);
  if (!s) return;
  s.favorites = s.favorites || [];
  s.likes = s.likes || [];
  s.dislikes = s.dislikes || [];
  const name = currentUser.name;
  let changed = false;

  if (clicked === 'fav') {
    const idx = s.favorites.indexOf(name);
    if (idx > -1) s.favorites.splice(idx, 1);
    else { s.favorites.push(name); const hidx = s.dislikes.indexOf(name); if (hidx > -1) s.dislikes.splice(hidx, 1); }
    changed = true;
  } else if (clicked === 'like') {
    const idx = s.likes.indexOf(name);
    if (idx > -1) s.likes.splice(idx, 1);
    else { s.likes.push(name); const hidx = s.dislikes.indexOf(name); if (hidx > -1) s.dislikes.splice(hidx, 1); }
    changed = true;
  } else if (clicked === 'hate') {
    const idx = s.dislikes.indexOf(name);
    if (idx > -1) s.dislikes.splice(idx, 1);
    else {
      s.dislikes.push(name);
      let fidx = s.favorites.indexOf(name); if (fidx > -1) s.favorites.splice(fidx, 1);
      let lidx = s.likes.indexOf(name); if (lidx > -1) s.likes.splice(lidx, 1);
    }
    changed = true;
  }

  if (changed) {
    await _sb.from('strains').update({ favorites: s.favorites, likes: s.likes, dislikes: s.dislikes }).eq('id', id);
    const wasOpen = openCards.has(id);
    sortAndRender();
    if (wasOpen) setTimeout(() => document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}), 120);
  }
}

async function saveNote(id) {
  const inp = document.getElementById(`notein-${id}`);
  if (!inp || !inp.value.trim()) return;
  const s = strains.find(x => x.id === id);
  if (!s) return;
  const note = { user: currentUser.name, text: inp.value.trim() };
  s.notes = [...(s.notes||[]), note];
  await _sb.from('strains').update({ notes: s.notes }).eq('id', id);
  inp.value = '';
  const container = document.getElementById(`notes-${id}`);
  if (container) container.innerHTML = buildNotesHtml(s);
}

function deleteNote(id, noteIndex) {
  showConfirm('Delete this note?', async () => {
    const s = strains.find(x => x.id === id);
    if (!s) return;
    s.notes = (s.notes||[]).filter((_,i) => i !== noteIndex);
    await _sb.from('strains').update({ notes: s.notes }).eq('id', id);
    const container = document.getElementById(`notes-${id}`);
    if (container) container.innerHTML = buildNotesHtml(s);
    showToast('Note deleted');
  });
}

function editNote(strainId, noteIndex) {
  if (currentEditingNote) return;
  const s = strains.find(x => x.id === strainId);
  if (!s) return;
  const note = s.notes[noteIndex];
  if (!note || note.user !== currentUser.name) return;
  currentEditingNote = { strainId, noteIndex };
  const noteEl = document.getElementById(`note-entry-${strainId}-${noteIndex}`);
  if (!noteEl) return;
  noteEl.innerHTML = `
    <span class="note-user" style="color:${(profiles.find(x=>x.name===note.user)||{}).color || 'var(--text)'}">${note.user}</span>
    <textarea id="edit-note-text-${strainId}-${noteIndex}" class="input" style="flex:1;min-height:64px;margin:0 8px;resize:vertical;">${note.text}</textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="cancelEditNote(${strainId},${noteIndex});">Cancel</button>
      <button class="btn btn-accent btn-sm" onclick="saveEditedNote(${strainId},${noteIndex});">Save</button>
    </div>`;
}

function cancelEditNote(strainId, noteIndex) {
  currentEditingNote = null;
  const s = strains.find(x => x.id === strainId);
  if (s) document.getElementById(`notes-${strainId}`).innerHTML = buildNotesHtml(s);
}

async function saveEditedNote(strainId, noteIndex) {
  const s = strains.find(x => x.id === strainId);
  if (!s) return;
  const textarea = document.getElementById(`edit-note-text-${strainId}-${noteIndex}`);
  if (!textarea) return cancelEditNote(strainId, noteIndex);
  const newText = textarea.value.trim();
  if (newText === '') {
    s.notes.splice(noteIndex, 1);
    await _sb.from('strains').update({ notes: s.notes }).eq('id', strainId);
    showToast('Note deleted');
  } else {
    s.notes[noteIndex].text = newText;
    await _sb.from('strains').update({ notes: s.notes }).eq('id', strainId);
    showToast('Note updated');
  }
  currentEditingNote = null;
  const container = document.getElementById(`notes-${strainId}`);
  if (container) container.innerHTML = buildNotesHtml(s);
}

// ═══════════ AI / MANUAL / EDIT ═══════════
function openAILookup() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) return showToast('Enter a strain name first');
  runAILookup(name);
}

async function runAILookup(name) {
  const btn = document.querySelector('#addOverlay .ai-btn');
  btn.innerHTML = '<span class="spinner"></span> Looking up...'; btn.disabled = true;
  try {
    const { data, error } = await _sb.functions.invoke('gemini-lookup', { body: { name } });
    if (error) throw error;
    let cleanJson = data && data.name ? data : data && data.candidates ? JSON.parse((data.candidates[0].content.parts[0].text || '').replace(/```json|```/g,'').trim()) : typeof data === 'string' ? JSON.parse(data.replace(/```json|```/g,'').trim()) : null;
    if (!cleanJson) throw new Error('Unexpected response');
    populateConfirmModal(name, cleanJson);
    document.getElementById('addOverlay').classList.remove('open');
    document.getElementById('aiConfirmOverlay').classList.add('open');
  } catch(e) {
    console.error(e);
    showToast('AI lookup failed — try manual add');
  } finally {
    btn.innerHTML = '✦ AI Lookup'; btn.disabled = false;
  }
}

function populateConfirmModal(name, d) {
  document.getElementById('confirm-name').value = d.name || name;
  document.getElementById('confirm-type').value = normalizeType(d.type || 'Hybrid');
  document.getElementById('confirm-thcnum').value = d.thcNum || d.thc || '';
  document.getElementById('confirm-genetics').value = d.genetics || '';
  document.getElementById('confirm-terpenes').value = d.terpenes || '';
  document.getElementById('confirm-flavor').value = d.flavor || '';
  document.getElementById('confirm-pros').value = d.pros || '';
  document.getElementById('confirm-cons').value = d.cons || '';
  document.getElementById('confirm-bestfor').value = d.bestFor || '';
  document.getElementById('confirm-tags').value = d.tags || '';
  document.getElementById('confirm-source').value = '';
  document.getElementById('confirm-cost').value = '';
  document.getElementById('confirm-medium').value = 'Flower';
  document.getElementById('confirm-cannab').value = 'Δ9';
}

function normalizeType(t) {
  const tl = t.toLowerCase();
  if (tl.includes('indica') && tl.includes('hybrid')) return 'Indica-Hybrid';
  if (tl.includes('sativa') && tl.includes('hybrid')) return 'Sativa-Hybrid';
  if (tl.includes('indica')) return 'Indica';
  if (tl.includes('sativa')) return 'Sativa';
  return 'Hybrid';
}

async function saveConfirmedStrain() {
  const thcRaw = document.getElementById('confirm-thcnum').value;
  const item = {
    name: document.getElementById('confirm-name').value,
    type: document.getElementById('confirm-type').value,
    medium: document.getElementById('confirm-medium').value,
    thc: thcRaw ? `${thcRaw}%` : '',
    thcNum: thcRaw ? parseFloat(thcRaw) : null,
    cannabinoid: document.getElementById('confirm-cannab').value,
    genetics: document.getElementById('confirm-genetics').value,
    terpenes: document.getElementById('confirm-terpenes').value,
    flavor: document.getElementById('confirm-flavor').value,
    pros: document.getElementById('confirm-pros').value,
    cons: document.getElementById('confirm-cons').value,
    bestFor: document.getElementById('confirm-bestfor').value,
    tags: document.getElementById('confirm-tags').value,
    source: document.getElementById('confirm-source').value,
    cost: document.getElementById('confirm-cost').value,
    stock: 'High Stock', favorites: [], likes: [], dislikes: [], notes: []
  };
  const { data } = await _sb.from('strains').insert([item]).select();
  if (data) { strains.unshift(data[0]); closeOverlays(); sortAndRender(); showToast(`${item.name} added!`); }
}

function openManualAdd() {
  const nameInput = document.getElementById('add-name').value.trim();
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('manualAddOverlay').classList.add('open');
  document.getElementById('manual-name').value = nameInput;
}

async function saveManualStrain() {
  const thcRaw = document.getElementById('manual-thcnum').value;
  const item = {
    name: document.getElementById('manual-name').value,
    type: document.getElementById('manual-type').value,
    medium: document.getElementById('manual-medium').value,
    thc: thcRaw ? `${thcRaw}%` : '',
    thcNum: thcRaw ? parseFloat(thcRaw) : null,
    cannabinoid: document.getElementById('manual-cannab').value,
    genetics: document.getElementById('manual-genetics').value,
    terpenes: document.getElementById('manual-terpenes').value,
    flavor: document.getElementById('manual-flavor').value,
    pros: document.getElementById('manual-pros').value,
    cons: document.getElementById('manual-cons').value,
    bestFor: document.getElementById('manual-bestfor').value,
    tags: document.getElementById('manual-tags').value,
    source: document.getElementById('manual-source').value,
    cost: document.getElementById('manual-cost').value,
    stock: 'High Stock', favorites: [], likes: [], dislikes: [], notes: []
  };
  if (!item.name) return showToast('Name required');
  const { data } = await _sb.from('strains').insert([item]).select();
  if (data) { strains.unshift(data[0]); closeOverlays(); sortAndRender(); showToast(`${item.name} added!`); }
}

function openEdit(id) {
  const s = strains.find(x => x.id === id);
  if (!s) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value = s.name || '';
  document.getElementById('edit-type').value = s.type || 'Hybrid';
  document.getElementById('edit-medium').value = s.medium || 'Flower';
  document.getElementById('edit-cannab').value = s.cannabinoid || 'Δ9';
  document.getElementById('edit-thcnum').value = s.thcNum || '';
  document.getElementById('edit-genetics').value = s.genetics || '';
  document.getElementById('edit-terpenes').value = s.terpenes || '';
  document.getElementById('edit-flavor').value = s.flavor || '';
  document.getElementById('edit-pros').value = s.pros || '';
  document.getElementById('edit-cons').value = s.cons || '';
  document.getElementById('edit-bestfor').value = s.bestFor || '';
  document.getElementById('edit-tags').value = s.tags || '';
  document.getElementById('edit-source').value = s.source || '';
  document.getElementById('edit-cost').value = s.cost || '';
  document.getElementById('editOverlay').classList.add('open');
}

async function saveEditedStrain() {
  const id = parseInt(document.getElementById('edit-id').value);
  const thcRaw = document.getElementById('edit-thcnum').value;
  const updates = {
    name: document.getElementById('edit-name').value,
    type: document.getElementById('edit-type').value,
    medium: document.getElementById('edit-medium').value,
    cannabinoid: document.getElementById('edit-cannab').value,
    thcNum: thcRaw ? parseFloat(thcRaw) : null,
    thc: thcRaw ? `${thcRaw}%` : '',
    genetics: document.getElementById('edit-genetics').value,
    terpenes: document.getElementById('edit-terpenes').value,
    flavor: document.getElementById('edit-flavor').value,
    pros: document.getElementById('edit-pros').value,
    cons: document.getElementById('edit-cons').value,
    bestFor: document.getElementById('edit-bestfor').value,
    tags: document.getElementById('edit-tags').value,
    source: document.getElementById('edit-source').value,
    cost: document.getElementById('edit-cost').value,
  };
  const { error } = await _sb.from('strains').update(updates).eq('id', id);
  if (!error) {
    const s = strains.find(x => x.id === id);
    if (s) Object.assign(s, updates);
    closeOverlays();
    sortAndRender();
    showToast('Saved!');
  }
}

async function deleteStrain() {
  const id = parseInt(document.getElementById('edit-id').value);
  if (!id) return;
  showConfirm('Delete this strain permanently?', async () => {
    await _sb.from('strains').delete().eq('id', id);
    strains = strains.filter(s => s.id !== id);
    closeOverlays();
    sortAndRender();
    showToast('Strain deleted');
  });
}

// ═══════════ CONFIRM / TOAST ═══════════
function showConfirm(msg, onAccept) {
  document.getElementById('confirmMsg').textContent = msg;
  pendingConfirm = onAccept;
  document.getElementById('confirmDialog').classList.add('open');
}
function confirmAccept() { document.getElementById('confirmDialog').classList.remove('open'); if (pendingConfirm) pendingConfirm(); pendingConfirm = null; }
function confirmReject() { document.getElementById('confirmDialog').classList.remove('open'); pendingConfirm = null; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Backdrop close
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) closeOverlays(); }));
document.getElementById('confirmDialog').addEventListener('click', e => { if (e.target === document.getElementById('confirmDialog')) confirmReject(); });

init();
</script>
